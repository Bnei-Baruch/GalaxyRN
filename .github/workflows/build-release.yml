name: Build Release (iOS & Android)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - both
          - android
          - ios
        default: 'both'
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' || 
      github.event.inputs.platform == 'android' || 
      github.event.inputs.platform == 'both'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "MQTT_TOKEN=${{ secrets.MQTT_PASS }}" >> .env
          echo "MQTT_URL=${{ secrets.MQTT_URL }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "SENTRY_ORG=${{ secrets.SENTRY_ORG }}" >> .env
          echo "SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}" >> .env
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> .env

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=keystore.jks" > android/keystore.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/keystore.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/keystore.properties

      - name: Build Android Bundle
        run: yarn run release:a

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ANDROID_VERSION_CODE=$(grep -o 'versionCode [0-9]*' android/app/build.gradle | sed 's/versionCode //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$ANDROID_VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Upload Android Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle-${{ steps.version.outputs.version }}-${{ steps.version.outputs.version_code }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Android APK (if exists)
        uses: actions/upload-artifact@v4
        if: hashFiles('android/app/build/outputs/apk/release/app-release.apk') != ''
        with:
          name: android-apk-${{ steps.version.outputs.version }}-${{ steps.version.outputs.version_code }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS Release
    runs-on: macos-14
    if: |
      github.event_name == 'push' || 
      github.event.inputs.platform == 'ios' || 
      github.event.inputs.platform == 'both'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "MQTT_TOKEN=${{ secrets.MQTT_PASS }}" >> .env
          echo "MQTT_URL=${{ secrets.MQTT_URL }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "SENTRY_ORG=${{ secrets.SENTRY_ORG }}" >> .env
          echo "SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}" >> .env
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> .env

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Import Certificates
        env:
          CERTIFICATES_P12: ${{ secrets.IOS_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.IOS_CERTIFICATES_PASSWORD }}
        run: |
          # Создаем временный keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Импортируем сертификаты
          echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm certificate.p12

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Bundle iOS
        run: yarn run release:i

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IOS_BUILD=$(grep -o 'CURRENT_PROJECT_VERSION = [^;]*;' ios/GalaxyRN.xcodeproj/project.pbxproj | head -1 | sed 's/CURRENT_PROJECT_VERSION = //;s/;//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$IOS_BUILD" >> $GITHUB_OUTPUT

      - name: Build iOS Archive
        run: |
          cd ios
          xcodebuild -workspace GalaxyRN.xcworkspace \
            -scheme GalaxyRN \
            -configuration Release \
            -archivePath $RUNNER_TEMP/GalaxyRN.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            archive

      - name: Export IPA
        run: |
          cd ios
          # Создаем ExportOptions.plist
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/GalaxyRN.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/GalaxyRN

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}
          path: ${{ runner.temp }}/GalaxyRN/*.ipa
          retention-days: 30

      - name: Upload dSYM
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsym-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}
          path: ${{ runner.temp }}/GalaxyRN.xcarchive/dSYMs
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
